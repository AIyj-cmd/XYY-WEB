# nginx 配置参考 — 部署到 /etc/nginx/sites-available/wz.tomatopia.top
# 然后: ln -s /etc/nginx/sites-available/wz.tomatopia.top /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name wz.tomatopia.top;
    return 301 https://wz.tomatopia.top$request_uri;
}

server {
    listen 443 ssl http2;
    server_name wz.tomatopia.top;

    ssl_certificate     /etc/letsencrypt/live/wz.tomatopia.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wz.tomatopia.top/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    server_tokens off;
    client_max_body_size 20M;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /cms {
        return 301 /cms/;
    }

    location /cms/ {
        proxy_pass http://127.0.0.1:8055/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /cms;
        proxy_read_timeout 120s;
    }

    location ~* ^/(?:_astro/|fonts/|logos/|about/|introduce-720p\.mp4|introduce-poster\.jpg|logo\.png|favicon\.svg|china-map.*\.svg) {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location ~ ^/(robots\.txt|sitemap-index\.xml|sitemap-[0-9]+\.xml)$ {
        proxy_pass http://127.0.0.1:4321;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
